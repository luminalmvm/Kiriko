name: lumit_flutter
description: "Lumit's Flutter frontend (K-174); see docs/archive/flutter-port/."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  iconoir_flutter: ^7.11.1
  file_selector: ^1.1.0
  # Multi-window (pop-out panels): each secondary window is its own Flutter
  # engine in the SAME OS process, so it shares this process's lumit_bridge.dll
  # and therefore the same engine document (see lib/popout/). Apache-2.0, no
  # third-party deps, SDK >=3.5.0 — compatible with this package's ^3.12.2.
  desktop_multi_window: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  # desktop_multi_window ships a Podspec, not a Package.swift, so macOS plugin
  # resolution must go through CocoaPods rather than Swift Package Manager
  # (Flutter's macOS default since 3.24) — SPM would refuse the plugin.
  config:
    enable-swift-package-manager: false
  uses-material-design: false
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Medium.otf
          weight: 500
